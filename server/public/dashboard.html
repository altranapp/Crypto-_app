<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a33;
      color: white;
    }

    h2 {
      text-align: center;
      padding: 15px;
    }

    .card {
      background: #1c2b4a;
      margin: 15px;
      padding: 15px;
      border-radius: 8px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: gold;
      border: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Dashboard</h2>

<div class="card">
  <h3>Welcome</h3>
  <p id="username">Loading...</p>
</div>

<div class="card">
  <h3>Balance</h3>
  <p id="balance">$0</p>
</div>

<div class="card">
  <h3>Deposit</h3>
  <input type="number" id="depositAmount" placeholder="Amount">
  <button onclick="deposit()">Deposit</button>
</div>

<div class="card">
  <h3>Withdraw</h3>
  <input type="number" id="withdrawAmount" placeholder="Amount">
  <button onclick="withdraw()">Withdraw</button>
</div>

<button onclick="logout()">Logout</button>

<script>
const API = "https://crypto-app-y5vn.onrender.com";

// ✅ LOAD USER
async function loadUser() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "index.html";
    return;
  }

  try {
    const res = await fetch(API + "/api/user/profile", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();
    console.log("USER:", data);

    if (!res.ok) {
      alert(data.message);
      logout();
      return;
    }

    document.getElementById("username").innerText = data.email;
    document.getElementById("balance").innerText = "$" + data.balance;

    // ✅ ALWAYS STORE USER ID SAFELY
    localStorage.setItem("userId", data._id);

  } catch (err) {
    console.error(err);
  }
}

// ✅ DEPOSIT
async function deposit() {
  const token = localStorage.getItem("token");
  const userId = localStorage.getItem("userId");
  const amount = Number(document.getElementById("depositAmount").value);

  if (!amount || amount <= 0) {
    alert("Enter valid amount");
    return;
  }

  const res = await fetch(API + "/api/user/deposit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token // ✅ ADD THIS
    },
    body: JSON.stringify({ userId, amount })
  });

  const data = await res.json();
  alert(data.message);

  loadUser();
}

// ✅ WITHDRAW
async function withdraw() {
  const token = localStorage.getItem("token");
  const userId = localStorage.getItem("userId");
  const amount = Number(document.getElementById("withdrawAmount").value);

  if (!amount || amount <= 0) {
    alert("Enter valid amount");
    return;
  }

  const res = await fetch(API + "/api/user/withdraw", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token // ✅ ADD THIS
    },
    body: JSON.stringify({ userId, amount })
  });

  const data = await res.json();
  alert(data.message);

  loadUser();
}

// ✅ LOGOUT
function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("userId");
  window.location.href = "index.html";
}

// LOAD USER ON PAGE LOAD
loadUser();
</script>
