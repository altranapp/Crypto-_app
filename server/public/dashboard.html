<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Crypto Dashboard</h1>

  <div class="card">
    <p><strong>Email:</strong> <span id="email">Loading...</span></p>
    <p><strong>Balance:</strong> $<span id="balance">0</span></p>
  </div>

  <div class="card">
    <h3>Deposit</h3>
    <input id="depositAmount" placeholder="Amount">
    <button onclick="deposit()">Deposit</button>
  </div>

  <div class="card">
    <h3>Withdraw</h3>
    <input id="withdrawAmount" placeholder="Amount">
    <button onclick="withdraw()">Withdraw</button>
  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<script>
const API = "https://crypto-app-y5vn.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/";
}

// Load user
async function loadDashboard() {
  try {
    const res = await fetch(`${API}/api/user/profile`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();

    document.getElementById("email").innerText = data.email;
    document.getElementById("balance").innerText = data.balance || 0;

    localStorage.setItem("userId", data._id); // save for deposit

  } catch (err) {
    alert("Session expired");
    logout();
  }
}

// Deposit
async function deposit() {
  const amount = Number(document.getElementById("depositAmount").value);
  const userId = localStorage.getItem("userId");

  const res = await fetch(`${API}/api/user/deposit`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ userId, amount })
  });

  const data = await res.json();

  alert(data.message);
  loadDashboard();
}

// Withdraw
async function withdraw() {
  const amount = Number(document.getElementById("withdrawAmount").value);
  const userId = localStorage.getItem("userId");

  const res = await fetch(`${API}/api/user/withdraw`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ userId, amount })
  });

  const data = await res.json();

  alert(data.message);
  loadDashboard();
}

// Logout
function logout() {
  localStorage.clear();
  window.location.href = "/";
}

loadDashboard();
</script>

</body>
</html>
