<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>Admin Panel</h2>

  <div class="card">
    <h3>Transactions</h3>
    <div id="transactions"></div>
  </div>

  <div class="card">
    <h3>Users</h3>
    <div id="users"></div>
  </div>

</div>

<script>
const API = "https://crypto-app-y5vn.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
  alert("Login first");
  window.location.href = "index.html";
}

// LOAD TRANSACTIONS
async function loadTransactions() {
  const res = await fetch(API + "/api/admin/transactions", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  let html = "";
  data.forEach(tx => {
    html += `
      <div class="card">
        <p>${tx.type} - $${tx.amount}</p>
        <p>Status: ${tx.status}</p>

        <button onclick="approve('${tx._id}')">Approve</button>
        <button onclick="reject('${tx._id}')">Reject</button>
      </div>
    `;
  });

  transactions.innerHTML = html;
}

// APPROVE
async function approve(id) {
  await fetch(API + "/api/admin/approve/" + id, {
    method: "POST",
    headers: { Authorization: "Bearer " + token }
  });

  loadTransactions();
}

// REJECT
async function reject(id) {
  await fetch(API + "/api/admin/reject/" + id, {
    method: "POST",
    headers: { Authorization: "Bearer " + token }
  });

  loadTransactions();
}

// LOAD USERS
async function loadUsers() {
  const res = await fetch(API + "/api/admin/users", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  let html = "";
  data.forEach(u => {
    html += `
      <div class="card">
        <p>${u.email}</p>
        <p>Balance: $${u.balance}</p>
        <p>Tier: ${u.tier}</p>
      </div>
    `;
  });

  users.innerHTML = html;
}

// INIT
loadTransactions();
loadUsers();
</script>

</body>
</html>
