<h2>Admin Panel</h2>

<button onclick="loadUsers()">Load Users</button>
<div id="users"></div>

<button onclick="loadTransactions()">Load Transactions</button>
<div id="transactions"></div>

<script>
async function loadUsers() {
  const res = await fetch("/api/admin/users");
  const data = await res.json();

  document.getElementById("users").innerHTML =
    data.map(u => `<p>${u.email} - $${u.balance}</p>`).join("");
}

async function loadTransactions() {
  const res = await fetch("/api/admin/transactions");
  const data = await res.json();

  document.getElementById("transactions").innerHTML =
    data.map(t => `
      <p>
        ${t.type} - $${t.amount} - ${t.status}
        <button onclick="approve('${t._id}')">Approve</button>
      </p>
    `).join("");
}

async function approve(id) {
  await fetch("/api/admin/approve/" + id, { method: "POST" });
  loadTransactions();
}
</script>
